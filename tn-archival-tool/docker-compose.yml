services:
  postgres:
    image: postgres:16-alpine
    container_name: tn-archival-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: archival
      POSTGRES_PASSWORD: archival
      POSTGRES_DB: tn_archival
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archival -d tn_archival"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tn-archival-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
